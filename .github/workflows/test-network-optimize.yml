name: Network Optimizer Compatibility Test

on:
  push:
    paths:
      - 'network-optimize/**'
      - '.github/workflows/test-network-optimize.yml'
  pull_request:
    paths:
      - 'network-optimize/**'
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Debian (latest 2)
          - distro: debian:12
            name: Debian 12 (Bookworm)
          - distro: debian:13
            name: Debian 13 (Trixie)

          # Ubuntu (latest 2 LTS)
          - distro: ubuntu:22.04
            name: Ubuntu 22.04 (Jammy)
          - distro: ubuntu:24.04
            name: Ubuntu 24.04 (Noble)

          # AlmaLinux (latest 2)
          - distro: almalinux:9
            name: AlmaLinux 9
          - distro: almalinux:10
            name: AlmaLinux 10

          # Rocky Linux (latest 2)
          - distro: rockylinux:9
            name: Rocky Linux 9
          - distro: rockylinux:10
            name: Rocky Linux 10

          # Fedora (latest 2)
          - distro: fedora:41
            name: Fedora 41
          - distro: fedora:42
            name: Fedora 42

          # Alpine (latest 2)
          - distro: alpine:3.20
            name: Alpine 3.20
          - distro: alpine:3.21
            name: Alpine 3.21

          # Arch
          - distro: archlinux:latest
            name: Arch Linux

          # openSUSE (latest 2)
          - distro: opensuse/leap:15.5
            name: openSUSE Leap 15.5
          - distro: opensuse/leap:15.6
            name: openSUSE Leap 15.6

    runs-on: ubuntu-latest
    name: ${{ matrix.name }}
    container:
      image: ${{ matrix.distro }}
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f /etc/os-release ]; then
            . /etc/os-release
            case "$ID" in
              debian|ubuntu)
                apt-get update -qq
                apt-get install -y -qq iputils-ping iproute2 procps gawk 2>/dev/null || true
                ;;
              centos|rhel|almalinux|rocky|fedora)
                dnf install -y -q iputils iproute procps-ng gawk 2>/dev/null || \
                yum install -y -q iputils iproute procps-ng gawk 2>/dev/null || true
                ;;
              alpine)
                apk add --no-cache bash iputils iproute2 procps gawk grep sed coreutils 2>/dev/null || true
                ;;
              arch|manjaro)
                pacman -Sy --noconfirm iputils iproute2 procps-ng gawk 2>/dev/null || true
                ;;
              opensuse*|sles)
                zypper -n install iputils iproute2 procps gawk 2>/dev/null || true
                ;;
            esac
          fi

      - name: Syntax check
        shell: bash
        run: bash -n network-optimize/network-optimize.sh

      - name: Test detect_distro
        shell: bash
        run: |
          source network-optimize/network-optimize.sh
          DISTRO=$(detect_distro)
          echo "Distro: $DISTRO"
          [ "$DISTRO" != "unknown" ] && echo "PASS" || { echo "FAIL: unknown distro"; exit 1; }

      - name: Test detect_memory_mb
        shell: bash
        run: |
          source network-optimize/network-optimize.sh
          MEM=$(detect_memory_mb)
          echo "Memory: ${MEM}MB"
          [ -n "$MEM" ] && [ "$MEM" -gt 0 ] 2>/dev/null && echo "PASS" || { echo "FAIL"; exit 1; }

      - name: Test kernel_version
        shell: bash
        run: |
          source network-optimize/network-optimize.sh
          KVER=$(kernel_version)
          echo "Kernel: $KVER"
          [ -n "$KVER" ] && echo "PASS" || { echo "FAIL"; exit 1; }

      - name: Test detect_link_speed
        shell: bash
        run: |
          source network-optimize/network-optimize.sh
          SPEED=$(detect_link_speed)
          echo "Speed: ${SPEED}Mbps"
          [ -n "$SPEED" ] && [ "$SPEED" -gt 0 ] 2>/dev/null && echo "PASS" || { echo "FAIL"; exit 1; }

      - name: Test classify_bandwidth
        shell: bash
        run: |
          source network-optimize/network-optimize.sh
          TESTS_PASSED=0
          for pair in "50:low" "500:medium" "5000:high" "50000:ultra"; do
            speed="${pair%%:*}"
            expected="${pair##*:}"
            got=$(classify_bandwidth "$speed")
            if [ "$got" = "$expected" ]; then
              echo "  ${speed}Mbps -> $got ✓"
              TESTS_PASSED=$((TESTS_PASSED + 1))
            else
              echo "  ${speed}Mbps -> $got ✗ (expected $expected)"
              exit 1
            fi
          done
          echo "PASS ($TESTS_PASSED/4)"

      - name: Test show_network_status
        shell: bash
        run: |
          source network-optimize/network-optimize.sh
          show_network_status
          echo "PASS"

      - name: Test config generation
        shell: bash
        run: |
          source network-optimize/network-optimize.sh
          MEM_MB=$(detect_memory_mb)
          TCP_MEM_LOW=$((MEM_MB * 1024 / 8))
          TCP_MEM_MID=$((MEM_MB * 1024 / 4))
          TCP_MEM_HIGH=$((MEM_MB * 1024 / 2))
          echo "tcp_mem: $TCP_MEM_LOW $TCP_MEM_MID $TCP_MEM_HIGH"
          [ "$TCP_MEM_LOW" -gt 0 ] && echo "PASS" || { echo "FAIL: tcp_mem calc"; exit 1; }

      - name: Test restore function
        shell: bash
        run: |
          source network-optimize/network-optimize.sh
          mkdir -p /etc/sysctl.d
          echo "# test" > /etc/sysctl.d/99-network-optimize.conf
          restore_network_defaults 2>&1 || true
          echo "PASS"

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "==============================="
          echo "Distro: ${{ matrix.name }}"
          cat /etc/os-release 2>/dev/null | grep PRETTY_NAME || true
          echo "Kernel: $(uname -r)"
          echo "Bash: $(bash --version | head -1)"
          echo "==============================="
