name: Kernel Optimize Live Test

on:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian:12
            name: Debian 12
          - distro: debian:13
            name: Debian 13
          - distro: ubuntu:22.04
            name: Ubuntu 22.04
          - distro: ubuntu:24.04
            name: Ubuntu 24.04
          - distro: almalinux:8
            name: AlmaLinux 8
          - distro: almalinux:9
            name: AlmaLinux 9
          - distro: rockylinux:8
            name: Rocky Linux 8
          - distro: rockylinux:9
            name: Rocky Linux 9
          - distro: fedora:41
            name: Fedora 41
          - distro: fedora:42
            name: Fedora 42
          - distro: alpine:3.20
            name: Alpine 3.20
          - distro: alpine:3.21
            name: Alpine 3.21
          - distro: archlinux:latest
            name: Arch Linux
          - distro: opensuse/leap:15.5
            name: openSUSE 15.5
          - distro: opensuse/leap:15.6
            name: openSUSE 15.6

    runs-on: ubuntu-latest
    name: ${{ matrix.name }}
    container:
      image: ${{ matrix.distro }}
      options: --privileged

    steps:
      - name: Pre-install essentials
        run: |
          if [ -f /etc/alpine-release ]; then
            apk add --no-cache bash tar gzip curl gawk procps grep sed coreutils kmod 2>/dev/null || true
          elif command -v zypper >/dev/null 2>&1; then
            zypper -n install tar gzip curl gawk procps kmod 2>/dev/null || true
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f /etc/os-release ]; then
            . /etc/os-release
            case "$ID" in
              debian|ubuntu)
                apt-get update -qq
                apt-get install -y -qq curl procps gawk kmod iproute2 iputils-ping 2>/dev/null || true
                ;;
              centos|rhel|almalinux|rocky|fedora)
                dnf install -y -q curl procps-ng gawk kmod iproute iputils 2>/dev/null || \
                yum install -y -q curl procps-ng gawk kmod iproute iputils 2>/dev/null || true
                ;;
              arch|manjaro)
                pacman -Sy --noconfirm curl procps-ng gawk kmod iproute2 iputils 2>/dev/null || true
                ;;
            esac
          fi

      - name: Download kejilion.sh
        shell: bash
        run: |
          curl -sS -o /tmp/kejilion.sh "https://raw.githubusercontent.com/kejilion/sh/main/kejilion.sh"
          chmod +x /tmp/kejilion.sh
          echo "Downloaded: $(wc -l < /tmp/kejilion.sh) lines"

      - name: Extract and test Kernel_optimize module
        shell: bash
        run: |
          cd kernel-optimize-live-test
          bash test-live.sh /tmp/kejilion.sh

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "==============================="
          echo "Distro: ${{ matrix.name }}"
          cat /etc/os-release 2>/dev/null | grep PRETTY_NAME || true
          echo "Kernel: $(uname -r)"
          echo "==============================="
